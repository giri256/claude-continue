<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="18" height="18" fill="currentColor">
          <path d="M208.49,120.49a12,12,0,0,1-17,0L140,69V216a12,12,0,0,1-24,0V69L64.49,120.49a12,12,0,0,1-17-17l72-72a12,12,0,0,1,17,0l72,72A12,12,0,0,1,208.49,120.49Z"></path>
        </svg>
      </div>
      <h2>Claude Dashboard</h2>
    </div>

    <div class="card">
      <div class="dashboard-row">
        <div class="status-indicator">
          <div class="dot pulsing" id="status-dot"></div>
          <span id="status-text">Monitoring Tabs</span>
        </div>
      </div>

      <div id="url-container" style="display: none;">
        <div class="url-display" id="url-text"></div>
      </div>

      <div class="time-display" id="time-display" style="display: none;">
        <div class="label" id="timer-label">Time Remaining</div>
        <div class="countdown" id="countdown">00:00:00</div>
      </div>

      <div class="actions" id="confirm-actions" style="display: none;">
        <button id="btn-resume" class="btn btn-primary">Resume Now</button>
        <button id="btn-cancel" class="btn btn-secondary">Cancel</button>
      </div>
    </div>

    <div class="input-section">
      <label class="label">Custom Prompt (Paste Text or Images here)</label>
      <textarea id="prompt-input" placeholder="Leave blank to default to 'continue' after a 5 min wait..."></textarea>
      <div id="image-preview-container" class="image-preview-container"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
